<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">AI News Aggregator 架构</text>

  <!-- Layer 1: GitHub Actions -->
  <rect x="320" y="45" width="260" height="36" rx="18" fill="url(#g1)"/>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="white" font-weight="bold">GitHub Actions（每 2 小时触发）</text>

  <!-- Arrow -->
  <line x1="450" y1="81" x2="450" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Layer 2: Data Collection -->
  <rect x="50" y="105" width="800" height="95" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">数据采集层</text>

  <!-- Source blocks -->
  <rect x="70" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="125" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">聚合平台</text>
  <text x="125" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">TechURLs / TopHub / Buzzing</text>

  <rect x="200" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="255" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">RSS 订阅</text>
  <text x="255" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">70+ 精选源</text>

  <rect x="330" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="385" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">微信公众号</text>
  <text x="385" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">52 个订阅源</text>

  <rect x="460" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="515" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">YouTube</text>
  <text x="515" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">AI 博主视频</text>

  <rect x="590" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="645" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">飞书知识库</text>
  <text x="645" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">WaytoAGI</text>

  <rect x="720" y="135" width="110" height="50" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="775" y="156" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">AI 产品库</text>
  <text x="775" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">AIbase 等</text>

  <!-- Arrow -->
  <line x1="450" y1="200" x2="450" y2="225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Processing -->
  <rect x="50" y="230" width="800" height="95" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">数据处理层</text>

  <rect x="70" y="262" width="175" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="157" y="283" text-anchor="middle" font-size="11" fill="#92400e" font-weight="bold">AI 相关性过滤</text>
  <text x="157" y="299" text-anchor="middle" font-size="9" fill="#d97706">关键词 + 正则匹配</text>

  <rect x="265" y="262" width="175" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="352" y="283" text-anchor="middle" font-size="11" fill="#92400e" font-weight="bold">内容去重</text>
  <text x="352" y="299" text-anchor="middle" font-size="9" fill="#d97706">Title + URL 哈希去重</text>

  <rect x="460" y="262" width="175" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="547" y="283" text-anchor="middle" font-size="11" fill="#92400e" font-weight="bold">标题翻译</text>
  <text x="547" y="299" text-anchor="middle" font-size="9" fill="#d97706">Google 翻译 API</text>

  <rect x="655" y="262" width="175" height="50" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="742" y="283" text-anchor="middle" font-size="11" fill="#92400e" font-weight="bold">归档管理</text>
  <text x="742" y="299" text-anchor="middle" font-size="9" fill="#d97706">45 天滚动归档</text>

  <!-- Arrow -->
  <line x1="450" y1="325" x2="450" y2="350" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Output -->
  <rect x="50" y="355" width="800" height="75" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="375" text-anchor="middle" font-size="12" fill="#475569" font-weight="bold">数据输出层</text>

  <rect x="70" y="384" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="130" y="406" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">latest-24h.json</text>

  <rect x="205" y="384" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="265" y="406" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">latest-7d.json</text>

  <rect x="340" y="384" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="400" y="406" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">archive.json</text>

  <rect x="475" y="384" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="535" y="406" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">title-zh-cache.json</text>

  <rect x="610" y="384" width="120" height="36" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="670" y="406" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">source-status.json</text>

  <!-- Arrow -->
  <line x1="450" y1="430" x2="450" y2="455" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: Web -->
  <rect x="150" y="460" width="600" height="70" rx="35" fill="url(#g4)"/>
  <text x="450" y="493" text-anchor="middle" font-size="14" fill="white" font-weight="bold">React SPA 前端（GitHub Pages）</text>
  <text x="450" y="512" text-anchor="middle" font-size="10" fill="#c4b5fd">多源筛选 · 关键词搜索 · 收藏 · 暗色模式 · 数据导出</text>

  <!-- Bottom arrows to build + deploy -->
  <line x1="320" y1="530" x2="320" y2="555" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="580" y1="530" x2="580" y2="555" stroke="#94a3b8" stroke-width="1.5"/>

  <rect x="190" y="558" width="260" height="32" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="320" y="578" text-anchor="middle" font-size="11" fill="#475569">pnpm build 构建生产版本</text>

  <rect x="460" y="558" width="260" height="32" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="590" y="578" text-anchor="middle" font-size="11" fill="#475569">gh-pages 部署到 GitHub Pages</text>
</svg>
