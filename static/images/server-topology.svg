<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="nodeShad">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#4a4a6a" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGlow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#fff"/>
    </pattern>
    <rect width="600" height="500" fill="url(#dots)"/>
  </g>

  <!-- Connection lines -->
  <g stroke="#4a4a6a" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrow)">
    <!-- Top-left: aibestapp.top -->
    <path d="M215,215 Q130,140 80,130" stroke-dasharray="5,3"/>
    <!-- Top-right: blog.aibestapp.top -->
    <path d="M385,215 Q470,140 520,130" stroke-dasharray="5,3"/>
    <!-- Bottom-left: stats.aibestapp.top -->
    <path d="M215,285 Q130,360 80,370" stroke-dasharray="5,3"/>
    <!-- Bottom-right: Telegram Bot -->
    <path d="M385,285 Q470,360 520,370" stroke-dasharray="5,3"/>
    <!-- Bottom: 交易机器人 -->
    <path d="M300,310 L300,420" stroke-dasharray="5,3"/>
  </g>

  <!-- Highlighted connection (glowing) for Nginx routes -->
  <g stroke="#e94560" stroke-width="1.5" fill="none" opacity="0.35" marker-end="url(#arrowGlow)">
    <path d="M215,215 Q130,140 80,130" stroke-dasharray="5,3"/>
    <path d="M385,215 Q470,140 520,130" stroke-dasharray="5,3"/>
    <path d="M215,285 Q130,360 80,370" stroke-dasharray="5,3"/>
  </g>

  <!-- === Center: HK Server === -->
  <g filter="url(#shadow)">
    <!-- Server outer box -->
    <rect x="220" y="200" width="160" height="100" rx="10" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
    <!-- Server rack lines -->
    <rect x="230" y="210" width="140" height="14" rx="3" fill="url(#serverGrad)" opacity="0.8"/>
    <rect x="230" y="228" width="140" height="14" rx="3" fill="url(#serverGrad)" opacity="0.8"/>
    <rect x="230" y="246" width="140" height="14" rx="3" fill="url(#serverGrad)" opacity="0.8"/>
    <!-- Server icon (small cluster) -->
    <circle cx="240" cy="270" r="3" fill="#e94560" opacity="0.6"/>
    <circle cx="250" cy="270" r="3" fill="#e94560" opacity="0.6"/>
    <circle cx="260" cy="270" r="3" fill="#e94560" opacity="0.6"/>
    <!-- Text -->
    <text x="300" y="260" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">HK服务器</text>
    <text x="300" y="278" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11" opacity="0.9">119.28.202.54</text>
  </g>

  <!-- === Service Nodes === -->

  <!-- 1. Top-left: aibestapp.top -->
  <g filter="url(#nodeShad)">
    <rect x="20" y="90" width="120" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#0f3460" stroke-width="1.5"/>
    <text x="80" y="118" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">aibestapp.top</text>
    <text x="80" y="136" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="10">静态网站</text>
    <text x="80" y="152" text-anchor="middle" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="9">Nginx 托管</text>
  </g>

  <!-- 2. Top-right: blog.aibestapp.top -->
  <g filter="url(#nodeShad)">
    <rect x="460" y="90" width="120" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#0f3460" stroke-width="1.5"/>
    <text x="520" y="118" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">blog.aibestapp.top</text>
    <text x="520" y="136" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="10">Nginx 反代</text>
    <text x="520" y="152" text-anchor="middle" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="9">→ GitHub Pages</text>
  </g>

  <!-- 3. Bottom-left: stats.aibestapp.top -->
  <g filter="url(#nodeShad)">
    <rect x="20" y="340" width="120" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#0f3460" stroke-width="1.5"/>
    <text x="80" y="368" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">stats.aibestapp.top</text>
    <text x="80" y="386" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="10">Nginx → Umami</text>
    <text x="80" y="402" text-anchor="middle" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="9">Docker 容器</text>
  </g>

  <!-- 4. Bottom-right: Telegram Bot -->
  <g filter="url(#nodeShad)">
    <rect x="460" y="340" width="120" height="70" rx="8" fill="url(#nodeGrad1)" stroke="#0f3460" stroke-width="1.5"/>
    <text x="520" y="368" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Telegram Bot</text>
    <text x="520" y="386" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="10">消息推送</text>
    <text x="520" y="402" text-anchor="middle" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="9">systemd 管理</text>
  </g>

  <!-- 5. Bottom center: 交易机器人 -->
  <g filter="url(#nodeShad)">
    <rect x="240" y="420" width="120" height="60" rx="8" fill="url(#nodeGrad1)" stroke="#e94560" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="300" y="446" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">交易机器人</text>
    <text x="300" y="464" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="10">量化策略 · systemd</text>
  </g>

  <!-- === Bottom annotation === -->
  <g>
    <rect x="170" y="470" width="260" height="24" rx="12" fill="#e94560" opacity="0.15" stroke="#e94560" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="300" y="486" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="11" font-weight="bold" opacity="0.9">
      Nginx 统一入口 · SSL · Docker
    </text>
  </g>

  <!-- Decorative corner accents -->
  <path d="M0,0 L20,0 L20,2 L2,2 L2,20 L0,20 Z" fill="#e94560" opacity="0.15"/>
  <path d="M600,0 L580,0 L580,2 L598,2 L598,20 L600,20 Z" fill="#e94560" opacity="0.15"/>
  <path d="M0,500 L20,500 L20,498 L2,498 L2,480 L0,480 Z" fill="#e94560" opacity="0.15"/>
  <path d="M600,500 L580,500 L580,498 L598,498 L598,480 L600,480 Z" fill="#e94560" opacity="0.15"/>
</svg>
