<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#0f0d14"/>
    </linearGradient>

    <!-- 客户端卡片渐变 -->
    <linearGradient id="clientGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#e07020"/>
    </linearGradient>

    <!-- 中转节点渐变 -->
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- 模型卡片渐变 -->
    <linearGradient id="modelGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9d4a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="modelGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87272"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="modelGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="modelGrad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="arrowGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 箭头标记 -->
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#ff8c42"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="350" fill="url(#bgGrad)"/>

  <!-- 微妙网格 -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="350"/>
    <line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="500" y1="0" x2="500" y2="350"/>
    <line x1="600" y1="0" x2="600" y2="350"/>
    <line x1="700" y1="0" x2="700" y2="350"/>
  </g>

  <!-- ===== 第一区：客户端 ===== -->

  <!-- 区域标签 -->
  <text x="145" y="38" text-anchor="middle" fill="#ff9d4a" font-family="'SF Mono','Courier New',monospace" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">你的代码 / 客户端</text>

  <!-- 客户端卡片 1：Telegram Bot -->
  <g filter="url(#softShadow)">
    <rect x="45" y="62" width="195" height="56" rx="10" fill="#1e1625" stroke="#ff8c42" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="45" y="62" width="4" height="56" rx="2" fill="url(#clientGrad)"/>
    <text x="65" y="91" fill="#ff9d4a" font-family="'SF Mono','Courier New',monospace" font-size="12" font-weight="600">Telegram Bot</text>
    <text x="65" y="108" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">/ask 调用大模型</text>
  </g>

  <!-- 客户端卡片 2：Hermes Agent -->
  <g filter="url(#softShadow)">
    <rect x="45" y="132" width="195" height="56" rx="10" fill="#1e1625" stroke="#ff8c42" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="45" y="132" width="4" height="56" rx="2" fill="url(#clientGrad)"/>
    <text x="65" y="161" fill="#ff9d4a" font-family="'SF Mono','Courier New',monospace" font-size="12" font-weight="600">Hermes Agent</text>
    <text x="65" y="178" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">智能助手调用</text>
  </g>

  <!-- 客户端卡片 3：更多应用 -->
  <g filter="url(#softShadow)">
    <rect x="45" y="202" width="195" height="56" rx="10" fill="#1e1625" stroke="#ff8c42" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="45" y="202" width="4" height="56" rx="2" fill="url(#clientGrad)"/>
    <text x="65" y="231" fill="#ff9d4a" font-family="'SF Mono','Courier New',monospace" font-size="12" font-weight="600">更多应用...</text>
    <text x="65" y="248" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">你的任何代码</text>
  </g>

  <!-- 箭头：客户端 → 中转 -->
  <line x1="245" y1="90" x2="310" y2="130" stroke="#ff8c42" stroke-width="2.5" marker-end="url(#arrowOrange)" filter="url(#arrowGlow)" opacity="0.8"/>
  <line x1="245" y1="160" x2="310" y2="160" stroke="#ff8c42" stroke-width="2.5" marker-end="url(#arrowOrange)" filter="url(#arrowGlow)" opacity="0.8"/>
  <line x1="245" y1="230" x2="310" y2="190" stroke="#ff8c42" stroke-width="2.5" marker-end="url(#arrowOrange)" filter="url(#arrowGlow)" opacity="0.8"/>

  <!-- ===== 第二区：sub2api 中转 ===== -->

  <!-- 区域标签 -->
  <text x="420" y="38" text-anchor="middle" fill="#60a5fa" font-family="'SF Mono','Courier New',monospace" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">统一 API 中转</text>

  <!-- 主中转节点 -->
  <g filter="url(#glow)">
    <rect x="310" y="110" width="220" height="100" rx="16" fill="url(#hubGrad)" opacity="0.15"/>
    <rect x="310" y="110" width="220" height="100" rx="16" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- 中转图标 -->
  <circle cx="420" cy="142" r="18" fill="#2563eb" opacity="0.3"/>
  <circle cx="420" cy="142" r="14" fill="#3b82f6" opacity="0.4"/>
  <text x="420" y="147" text-anchor="middle" fill="#fff" font-family="'SF Mono','Courier New',monospace" font-size="16" font-weight="bold">⇄</text>

  <!-- 中转标题 -->
  <text x="420" y="180" text-anchor="middle" fill="#fff" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">sub2api</text>
  <text x="420" y="198" text-anchor="middle" fill="#93c5fd" font-family="'SF Mono','Courier New',monospace" font-size="11">统一 API 地址 · 智能路由</text>

  <!-- 箭头：中转 → 模型 -->
  <line x1="535" y1="135" x2="595" y2="75" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#arrowGlow)" opacity="0.6"/>
  <line x1="535" y1="160" x2="595" y2="160" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#arrowGlow)" opacity="0.6"/>
  <line x1="535" y1="185" x2="595" y2="245" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#arrowGlow)" opacity="0.6"/>

  <!-- ===== 第三区：模型 ===== -->

  <!-- 区域标签 -->
  <text x="700" y="38" text-anchor="middle" fill="#a78bfa" font-family="'SF Mono','Courier New',monospace" font-size="11" font-weight="600" letter-spacing="2" opacity="0.7">多模型支持</text>

  <!-- 模型卡片 1：OpenAI -->
  <g filter="url(#softShadow)">
    <rect x="600" y="50" width="175" height="52" rx="10" fill="#1e1625" stroke="#ff9d4a" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="600" y="50" width="175" height="4" rx="2" fill="url(#modelGrad1)"/>
    <text x="620" y="76" fill="#ff9d4a" font-family="'SF Mono','Courier New',monospace" font-size="13" font-weight="600">OpenAI</text>
    <text x="620" y="92" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">GPT-4o · o3 · o4-mini</text>
  </g>

  <!-- 模型卡片 2：Claude -->
  <g filter="url(#softShadow)">
    <rect x="600" y="135" width="175" height="52" rx="10" fill="#1e1625" stroke="#f87272" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="600" y="135" width="175" height="4" rx="2" fill="url(#modelGrad2)"/>
    <text x="620" y="161" fill="#f87272" font-family="'SF Mono','Courier New',monospace" font-size="13" font-weight="600">Claude</text>
    <text x="620" y="177" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">Opus 4 · Sonnet 4</text>
  </g>

  <!-- 模型卡片 3：DeepSeek -->
  <g filter="url(#softShadow)">
    <rect x="600" y="220" width="175" height="52" rx="10" fill="#1e1625" stroke="#6ee7b7" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="600" y="220" width="175" height="4" rx="2" fill="url(#modelGrad3)"/>
    <text x="620" y="246" fill="#6ee7b7" font-family="'SF Mono','Courier New',monospace" font-size="13" font-weight="600">DeepSeek</text>
    <text x="620" y="262" fill="#999" font-family="'SF Mono','Courier New',monospace" font-size="10">V4 · R1</text>
  </g>

  <!-- 更多模型指示器 -->
  <g opacity="0.5">
    <text x="687" y="300" text-anchor="middle" fill="#a78bfa" font-family="'SF Mono','Courier New',monospace" font-size="11">⋮ 更多模型 ⋮</text>
  </g>

  <!-- ===== 底部装饰线 ===== -->
  <line x1="60" y1="328" x2="740" y2="328" stroke="#ff8c42" stroke-width="0.5" opacity="0.15"/>

  <!-- 底部标签 -->
  <text x="400" y="340" text-anchor="middle" fill="#666" font-family="'SF Mono','Courier New',monospace" font-size="9" letter-spacing="1">sub2api — 一套 API 接入所有大模型</text>
</svg>