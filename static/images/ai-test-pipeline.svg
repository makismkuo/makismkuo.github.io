<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="520" fill="#fafafa" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">AI 测试生成流水线</text>

  <!-- Step 1: Source Code -->
  <rect x="50" y="70" width="180" height="70" rx="10" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">📄 源码输入</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#555">函数签名 · 类型注解</text>
  <text x="140" y="135" text-anchor="middle" font-size="11" fill="#555">文档字符串</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="105" x2="290" y2="105" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Step 2: AI Analysis -->
  <rect x="290" y="70" width="200" height="70" rx="10" fill="#fff3e0" stroke="#f5a623" stroke-width="2"/>
  <text x="390" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">🤖 AI 分析</text>
  <text x="390" y="120" text-anchor="middle" font-size="11" fill="#555">理解逻辑路径</text>
  <text x="390" y="135" text-anchor="middle" font-size="11" fill="#555">识别边界条件</text>

  <!-- Arrow 2→3 -->
  <line x1="490" y1="105" x2="550" y2="105" stroke="#f5a623" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Step 3: Test Generation -->
  <rect x="550" y="70" width="200" height="70" rx="10" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">✍️ 测试生成</text>
  <text x="650" y="120" text-anchor="middle" font-size="11" fill="#555">pytest / unittest</text>
  <text x="650" y="135" text-anchor="middle" font-size="11" fill="#555">mock + fixture</text>

  <!-- Arrow 3→4 -->
  <line x1="650" y1="140" x2="650" y2="200" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 4: Auto-Run -->
  <rect x="550" y="200" width="200" height="70" rx="10" fill="#fce4ec" stroke="#e53935" stroke-width="2"/>
  <text x="650" y="230" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">▶️ 自动运行</text>
  <text x="650" y="250" text-anchor="middle" font-size="11" fill="#555">CI 集成 · 覆盖率报告</text>
  <text x="650" y="265" text-anchor="middle" font-size="11" fill="#555">结果审计</text>

  <!-- Arrow right → decision -->
  <line x1="750" y1="235" x2="810" y2="235" stroke="#e53935" stroke-width="2"/>

  <!-- Decision diamond -->
  <polygon points="830,235 870,265 830,295 790,265" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <text x="830" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1a2e">覆盖</text>
  <text x="830" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1a2e">达标？</text>

  <!-- Fail path back to AI -->
  <path d="M 790 265 L 140 265 L 140 140" fill="none" stroke="#e53935" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="460" y="258" text-anchor="middle" font-size="10" fill="#e53935" font-style="italic">未达标 → 迭代</text>

  <!-- Pass path → Done -->
  <path d="M 830 295 L 830 400 L 650 400 L 650 350" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="740" y="393" text-anchor="middle" font-size="10" fill="#4caf50" font-style="italic">达标</text>

  <!-- Done -->
  <rect x="550" y="350" width="200" height="60" rx="30" fill="#4caf50" opacity="0.9"/>
  <text x="650" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">✅ 测试套件就绪</text>

  <!-- Constraints sidebar -->
  <rect x="50" y="180" width="200" height="120" rx="10" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">📋 约束条件</text>
  <text x="65" y="228" font-size="10" fill="#555">• 项目测试风格规范</text>
  <text x="65" y="245" font-size="10" fill="#555">• 已有 fixture 复用</text>
  <text x="65" y="262" font-size="10" fill="#555">• 模块导入路径</text>
  <text x="65" y="279" font-size="10" fill="#555">• Mock 策略约定</text>

  <!-- Human review note -->
  <rect x="50" y="330" width="200" height="70" rx="10" fill="#fff8e1" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a2e">👀 人工抽检</text>
  <text x="60" y="375" font-size="10" fill="#555">AI 生成的测试仍需人工</text>
  <text x="60" y="390" font-size="10" fill="#555">审核逻辑合理性</text>

  <!-- Arrow from constraints to AI -->
  <path d="M 200 240 L 290 240 L 290 140" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5a623"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53935"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>