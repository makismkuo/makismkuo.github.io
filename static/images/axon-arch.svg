<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'SF Pro','Inter',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/></linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2dd4bf"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity=".3"/></filter>
  </defs>
  <rect width="900" height="580" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="1">Axon 架构：从代码到知识图谱</text>

  <!-- Layer 1: Source Code -->
  <rect x="60" y="60" width="780" height="80" rx="12" fill="rgba(99,102,241,.08)" stroke="rgba(99,102,241,.2)" stroke-width="1" filter="url(#shadow)"/>
  <text x="80" y="85" fill="#818cf8" font-size="11" font-weight="600" letter-spacing="1.5" text-transform="uppercase">SOURCE CODE</text>
  <text x="80" y="105" fill="#94a3b8" font-size="12" font-family="'SF Mono','JetBrains Mono',monospace">src/service/user.py · src/handler/auth.py · src/domain/payment.py</text>
  <text x="80" y="122" fill="#64748b" font-size="11" font-family="'SF Mono','JetBrains Mono',monospace">42 files · 18,304 lines · Python 3.12 + TypeScript</text>

  <!-- Arrow 1 -->
  <path d="M450 140 L450 175" stroke="rgba(99,102,241,.3)" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Layer 2: Tree-sitter Parsing -->
  <rect x="60" y="175" width="780" height="70" rx="12" fill="rgba(45,212,191,.06)" stroke="rgba(45,212,191,.15)" stroke-width="1" filter="url(#shadow)"/>
  <text x="80" y="200" fill="#2dd4bf" font-size="11" font-weight="600" letter-spacing="1.5">TREE-SITTER PARSER</text>
  <text x="80" y="220" fill="#94a3b8" font-size="12">AST 解析 → 提取 623 个符号 · 1847 条边 · 8 个集群 · 34 条执行流</text>
  <text x="80" y="237" fill="#64748b" font-size="11">12 阶段分析流水线 · 平均扫描耗时 4.2s</text>

  <!-- Arrow 2 -->
  <path d="M450 245 L450 280" stroke="rgba(45,212,191,.3)" stroke-width="1.5" fill="none"/>

  <!-- Layer 3: Knowledge Graph -->
  <rect x="60" y="280" width="380" height="120" rx="12" fill="rgba(245,158,11,.06)" stroke="rgba(245,158,11,.15)" stroke-width="1" filter="url(#shadow)"/>
  <text x="80" y="305" fill="#f59e0b" font-size="11" font-weight="600" letter-spacing="1.5">KNOWLEDGE GRAPH (NEO4J)</text>

  <!-- Graph nodes -->
  <circle cx="150" cy="345" r="6" fill="#f59e0b" filter="url(#glow)"/>
  <text x="162" y="348" fill="#94a3b8" font-size="10">UserService</text>
  <circle cx="260" cy="365" r="4" fill="#fbbf24"/>
  <text x="270" y="368" fill="#64748b" font-size="9">validate()</text>
  <circle cx="200" cy="380" r="4" fill="#fbbf24"/>
  <text x="210" y="383" fill="#64748b" font-size="9">payment_handler</text>

  <line x1="150" y1="345" x2="260" y2="365" stroke="rgba(245,158,11,.3)" stroke-width="1"/>
  <line x1="150" y1="345" x2="200" y2="380" stroke="rgba(245,158,11,.3)" stroke-width="1"/>

  <!-- Layer 3 Right: Vector Index -->
  <rect x="460" y="280" width="380" height="120" rx="12" fill="rgba(236,72,153,.06)" stroke="rgba(236,72,153,.15)" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="305" fill="#ec4899" font-size="11" font-weight="600" letter-spacing="1.5">VECTOR INDEX (CHROMA)</text>
  <rect x="490" y="320" width="90" height="22" rx="6" fill="rgba(236,72,153,.1)"/>
  <text x="500" y="335" fill="#f472b6" font-size="10">语义搜索</text>
  <rect x="590" y="320" width="90" height="22" rx="6" fill="rgba(236,72,153,.1)"/>
  <text x="600" y="335" fill="#f472b6" font-size="10">相似度匹配</text>
  <rect x="690" y="320" width="90" height="22" rx="6" fill="rgba(236,72,153,.1)"/>
  <text x="700" y="335" fill="#f472b6" font-size="10">模糊查询</text>
  <text x="490" y="370" fill="#64748b" font-size="10">结构关系 + 语义相似度 联合查询</text>
  <text x="490" y="387" fill="#64748b" font-size="10">替代传统 grep + 字符串匹配</text>

  <!-- Arrow 3 -->
  <path d="M450 400 L450 435" stroke="rgba(99,102,241,.3)" stroke-width="1.5" fill="none"/>

  <!-- Layer 4: MCP Server -->
  <rect x="60" y="435" width="780" height="65" rx="12" fill="rgba(99,102,241,.08)" stroke="rgba(99,102,241,.2)" stroke-width="1" filter="url(#shadow)"/>
  <text x="80" y="460" fill="#818cf8" font-size="11" font-weight="600" letter-spacing="1.5">MCP SERVER</text>
  <rect x="80" y="470" width="160" height="22" rx="6" fill="rgba(99,102,241,.12)"/>
  <text x="90" y="485" fill="#a5b4fc" font-size="10" font-family="'SF Mono',monospace">axon_impact()</text>
  <rect x="250" y="470" width="150" height="22" rx="6" fill="rgba(99,102,241,.12)"/>
  <text x="260" y="485" fill="#a5b4fc" font-size="10" font-family="'SF Mono',monospace">axon_query()</text>
  <rect x="410" y="470" width="160" height="22" rx="6" fill="rgba(99,102,241,.12)"/>
  <text x="420" y="485" fill="#a5b4fc" font-size="10" font-family="'SF Mono',monospace">axon_context()</text>

  <!-- Arrow 4 -->
  <path d="M450 500 L450 530" stroke="rgba(99,102,241,.3)" stroke-width="1.5" fill="none"/>

  <!-- Layer 5: AI Agents -->
  <rect x="120" y="530" width="660" height="40" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="450" y="555" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="500">Claude Code · Codex · Cursor · 任何 MCP 兼容客户端</text>
</svg>
