<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Agent 模式适用场景清单</text>

  <!-- ✅ DO -->
  <rect x="20" y="60" width="375" height="340" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <rect x="20" y="60" width="375" height="35" rx="10" fill="#22d3ee" fill-opacity="0.1"/>
  <text x="207" y="83" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">✅ 适合用 Agent 模式</text>

  <rect x="40" y="115" width="335" height="60" rx="8" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="55" y="138" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">重构已知架构的代码</text>
  <text x="55" y="156" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">换个框架、改个接口风格——比人快 3-5 倍</text>

  <rect x="40" y="185" width="335" height="60" rx="8" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="55" y="208" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">写单元测试</text>
  <text x="55" y="226" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">自动分析边界条件、mock 依赖、跑覆盖率</text>

  <rect x="40" y="255" width="335" height="60" rx="8" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="55" y="278" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">批量改文件</text>
  <text x="55" y="296" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">重命名、加日志、改注释、统一风格</text>

  <rect x="40" y="325" width="335" height="55" rx="8" fill="#22d3ee" fill-opacity="0.05" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="55" y="348" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">读代码写文档</text>
  <text x="55" y="366" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">理解已有代码然后生成文档——比大多数人做得好</text>

  <!-- ❌ DON'T -->
  <rect x="405" y="60" width="375" height="340" rx="10" fill="#1e293b" stroke="#fb7185" stroke-width="1"/>
  <rect x="405" y="60" width="375" height="35" rx="10" fill="#fb7185" fill-opacity="0.1"/>
  <text x="592" y="83" text-anchor="middle" fill="#fb7185" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">❌ 不建议用 Agent 模式</text>

  <rect x="425" y="115" width="335" height="60" rx="8" fill="#fb7185" fill-opacity="0.03" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="440" y="138" fill="#fb7185" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">设计新系统架构</text>
  <text x="440" y="156" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">概念设计需要全局视角，Agent 做不到</text>

  <rect x="425" y="185" width="335" height="60" rx="8" fill="#fb7185" fill-opacity="0.03" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="440" y="208" fill="#fb7185" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">深度业务理解的任务</text>
  <text x="440" y="226" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">成败取决于你对领域知识的理解，别交出去</text>

  <rect x="425" y="255" width="335" height="60" rx="8" fill="#fb7185" fill-opacity="0.03" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="440" y="278" fill="#fb7185" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">安全敏感代码</text>
  <text x="440" y="296" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">至少做一次人工审查——我见过硬编码 API Key</text>

  <rect x="425" y="325" width="335" height="55" rx="8" fill="#fb7185" fill-opacity="0.03" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="440" y="348" fill="#fb7185" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">Token 预算紧张</text>
  <text x="440" y="366" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">不是说省钱第一，而是你心里要有数</text>
</svg>
