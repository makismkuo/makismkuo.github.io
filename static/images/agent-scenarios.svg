<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="800" height="380" fill="url(#bg3)"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="bold">什么时候用 Agent 模式？</text>

  <!-- Left: ✅ DO -->
  <rect x="20" y="60" width="370" height="300" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="20" y="60" width="370" height="40" rx="10" fill="#22d3ee" fill-opacity="0.08"/>
  <text x="205" y="87" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">✅ 适合用 Agent 模式</text>

  <rect x="35" y="115" width="340" height="40" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="131" fill="#34d399" font-family="system-ui,sans-serif" font-size="12">🛠️ 重构已知架构的代码</text>
  <text x="48" y="147" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">换框架、改接口风格，比人快 3-5 倍</text>

  <rect x="35" y="165" width="340" height="40" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="181" fill="#34d399" font-family="system-ui,sans-serif" font-size="12">🧪 写单元测试</text>
  <text x="48" y="197" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">最强场景！自动分析边界条件、mock 依赖、跑覆盖率</text>

  <rect x="35" y="215" width="340" height="40" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="231" fill="#34d399" font-family="system-ui,sans-serif" font-size="12">📦 批量改文件</text>
  <text x="48" y="247" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">重命名、加日志、改注释、统一风格</text>

  <rect x="35" y="265" width="340" height="40" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="281" fill="#34d399" font-family="system-ui,sans-serif" font-size="12">📝 读代码写文档</text>
  <text x="48" y="297" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">理解已有代码后生成文档，比大多数人做得好</text>

  <rect x="35" y="315" width="340" height="30" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="1" stroke-opacity="0.3"/>
  <text x="205" y="335" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="11">✅ 所有「你知道该怎么做但懒得动手」的任务</text>

  <!-- Right: ❌ DON'T -->
  <rect x="410" y="60" width="370" height="300" rx="10" fill="#1e293b" stroke="#fb7185" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="410" y="60" width="370" height="40" rx="10" fill="#fb7185" fill-opacity="0.08"/>
  <text x="595" y="87" text-anchor="middle" fill="#fb7185" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">❌ 不建议用 Agent 模式</text>

  <rect x="425" y="115" width="340" height="40" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="438" y="131" fill="#f87171" font-family="system-ui,sans-serif" font-size="12">🏗️ 设计新系统的架构</text>
  <text x="438" y="147" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">概念设计需要全局视角，Agent 做不到</text>

  <rect x="425" y="165" width="340" height="40" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="438" y="181" fill="#f87171" font-family="system-ui,sans-serif" font-size="12">🧠 深度业务理解的任务</text>
  <text x="438" y="197" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">代码成败取决于领域知识理解，别交给 Agent</text>

  <rect x="425" y="215" width="340" height="40" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="438" y="231" fill="#f87171" font-family="system-ui,sans-serif" font-size="12">🔒 安全敏感的代码</text>
  <text x="438" y="247" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">至少做一次人工审查。见过硬编码 API Key 和 SQL 注入</text>

  <rect x="425" y="265" width="340" height="40" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="438" y="281" fill="#f87171" font-family="system-ui,sans-serif" font-size="12">💸 Token 预算紧张时</text>
  <text x="438" y="297" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">不是说省钱第一，而是心里要有数</text>

  <rect x="425" y="315" width="340" height="30" rx="8" fill="#7f1d1d" fill-opacity="0.3" stroke="#f87171" stroke-width="1" stroke-opacity="0.3"/>
  <text x="595" y="335" text-anchor="middle" fill="#f87171" font-family="system-ui,sans-serif" font-size="11">❌ 所有「你也不确定方向」的任务</text>
</svg>
