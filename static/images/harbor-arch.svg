<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="harborGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  <rect width="800" height="500" fill="url(#glow)" rx="12"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#a5b4fc" font-size="16" font-weight="600" letter-spacing="2">ONE COMMAND TO RULE THEM ALL</text>

  <!-- Center: Harbor CLI -->
  <rect x="290" y="65" width="220" height="70" rx="12" fill="url(#harborGrad)" filter="url(#shadow)"/>
  <text x="400" y="97" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">harbor up</text>
  <text x="400" y="120" text-anchor="middle" fill="#c7d2fe" font-size="12" letter-spacing="1">CLI 指挥中心</text>

  <!-- Arrows from center to services -->
  <!-- Top row connections -->
  <line x1="400" y1="135" x2="400" y2="165" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="400" y1="165" x2="400" y2="165" stroke="#6366f1" stroke-width="0"/>

  <!-- Left side -->
  <line x1="400" y1="175" x2="130" y2="175" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="130" y1="175" x2="130" y2="195" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Right side -->
  <line x1="400" y1="175" x2="670" y2="175" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="670" y1="175" x2="670" y2="195" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Top-middle connections -->
  <line x1="180" y1="185" x2="180" y2="195" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="620" y1="185" x2="620" y2="195" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Row 1: Inference Backends -->
  <rect x="60" y="200" width="140" height="55" rx="8" fill="url(#boxGrad1)" filter="url(#shadow)" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="130" y="223" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="600">🦙 Ollama</text>
  <text x="130" y="240" text-anchor="middle" fill="#8b9dc3" font-size="10">llama.cpp · vLLM · MLX</text>

  <rect x="230" y="200" width="140" height="55" rx="8" fill="url(#boxGrad1)" filter="url(#shadow)" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="223" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="600">💬 Open WebUI</text>
  <text x="300" y="240" text-anchor="middle" fill="#8b9dc3" font-size="10">ChatUI · Morphic</text>

  <rect x="430" y="200" width="140" height="55" rx="8" fill="url(#boxGrad1)" filter="url(#shadow)" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="223" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="600">🔍 SearXNG</text>
  <text x="500" y="240" text-anchor="middle" fill="#8b9dc3" font-size="10">联网 RAG 搜索</text>

  <rect x="600" y="200" width="140" height="55" rx="8" fill="url(#boxGrad1)" filter="url(#shadow)" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="223" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="600">🎤 Speaches</text>
  <text x="670" y="240" text-anchor="middle" fill="#8b9dc3" font-size="10">语音对话 / TTS</text>

  <!-- Row 2: More services -->
  <rect x="60" y="285" width="140" height="55" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
  <text x="130" y="308" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🎨 ComfyUI</text>
  <text x="130" y="325" text-anchor="middle" fill="#8b9dc3" font-size="10">Flux / SD 生图</text>

  <rect x="230" y="285" width="140" height="55" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
  <text x="300" y="308" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🔧 TabbyAPI</text>
  <text x="300" y="325" text-anchor="middle" fill="#8b9dc3" font-size="10">SGLang · DMR</text>

  <rect x="430" y="285" width="140" height="55" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
  <text x="500" y="308" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🛡️ Traefik</text>
  <text x="500" y="325" text-anchor="middle" fill="#8b9dc3" font-size="10">反向代理 + SSL</text>

  <rect x="600" y="285" width="140" height="55" rx="8" fill="url(#boxGrad2)" filter="url(#shadow)" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
  <text x="670" y="308" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🌐 Bifrost</text>
  <text x="670" y="325" text-anchor="middle" fill="#8b9dc3" font-size="10">AI 网关</text>

  <!-- Bottom: harbor launch -->
  <rect x="230" y="380" width="340" height="50" rx="10" fill="#1e1b4b" filter="url(#shadow)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="405" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="500">harbor launch → 编程 Agent</text>
  <text x="400" y="420" text-anchor="middle" fill="#64748b" font-size="10">Codex · Claude Code · Copilot · OpenCode · Hermes</text>

  <!-- Connection lines to bottom -->
  <line x1="300" y1="340" x2="300" y2="380" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="400" y1="340" x2="400" y2="380" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="500" y1="340" x2="500" y2="380" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Bottom tags -->
  <text x="400" y="470" text-anchor="middle" fill="#4f46e5" font-size="11" font-weight="500" letter-spacing="3">macOS Metal · 局域网访问 · GUI 桌面端 · 隧道公网</text>
  <text x="400" y="490" text-anchor="middle" fill="#1e3a5f" font-size="10">所有服务 Docker Compose 自动编排，零手动配置</text>
</svg>
