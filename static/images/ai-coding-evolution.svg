<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">AI 编程工作流进化路径</text>
  <text x="400" y="62" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">从 Chat → Agent → Multi-Agent</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Layer 1: Chat Mode (Bottom - widest) -->
  <g transform="translate(400, 520)">
    <polygon points="-320,0 320,0 280,-80 -280,-80" fill="url(#layer1)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="-30" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Chat 模式</text>
    <text x="0" y="-14" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">你写提示 → AI 给代码 → 你复制粘贴</text>
    <text x="-140" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• ChatGPT / Claude Web</text>
    <text x="140" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 控制力 ★★★★★</text>
    <text x="-140" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 学习成本零</text>
    <text x="140" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 效率 ★★</text>
  </g>

  <!-- Layer 2: Agent Mode -->
  <g transform="translate(400, 370)">
    <polygon points="-240,0 240,0 200,-80 -200,-80" fill="url(#layer2)" stroke="#34d399" stroke-width="1.5"/>
    <text x="0" y="-30" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Agent 模式</text>
    <text x="0" y="-14" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">指令 → AI 自动读代码/跑命令/修复</text>
    <text x="-110" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• Claude Code / Cursor Agent</text>
    <text x="110" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 效率 ★★★★</text>
    <text x="-110" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 你负责决策</text>
    <text x="110" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• Token消耗大</text>
  </g>

  <!-- Layer 3: Multi-Agent Mode (Top - narrowest) -->
  <g transform="translate(400, 220)">
    <polygon points="-160,0 160,0 120,-80 -120,-80" fill="url(#layer3)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="0" y="-30" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">Multi-Agent 模式</text>
    <text x="0" y="-14" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">多 Agent 分工协作</text>
    <text x="-70" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 各司其职</text>
    <text x="70" y="10" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 协调成本高</text>
    <text x="-70" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 适合信息处理</text>
    <text x="70" y="25" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">• 生产代码待验证</text>
  </g>

  <!-- Connection arrows -->
  <line x1="400" y1="435" x2="400" y2="375" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,4"/>
  <line x1="400" y1="285" x2="400" y2="235" stroke="#64748b" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,4"/>

  <!-- Bottom legend -->
  <rect x="280" y="565" width="240" height="25" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="581" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">叠层关系 → 不是替代，是升级</text>
</svg>
