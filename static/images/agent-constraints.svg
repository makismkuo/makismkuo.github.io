<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#b)"/>
  <rect x="50" y="50" width="700" height="250" rx="15" fill="url(#bg4)" stroke="#334155" stroke-width="1"/>

  <!-- 3 columns -->
  <text x="180" y="120" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="22" font-weight="bold">💬</text>
  <text x="180" y="145" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="14">Chat 模式</text>
  <rect x="100" y="155" width="160" height="3" rx="1" fill="#22d3ee" fill-opacity="0.3"/>
  <text x="180" y="180" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">你写提示 → AI 给代码</text>
  <text x="180" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">你手动复制粘贴</text>
  <text x="180" y="220" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11">控制力 ★★★★★</text>

  <!-- Arrow 1 -->
  <text x="330" y="145" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="28">→</text>

  <text x="400" y="120" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="22" font-weight="bold">🤖</text>
  <text x="400" y="145" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="14">Agent 模式</text>
  <rect x="320" y="155" width="160" height="3" rx="1" fill="#34d399" fill-opacity="0.3"/>
  <text x="400" y="180" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">指令 → 自动读代码/执行</text>
  <text x="400" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">自动修复/重试</text>
  <text x="400" y="220" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11">效率 ★★★★</text>

  <!-- Arrow 2 -->
  <text x="550" y="145" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="28">→</text>

  <text x="620" y="120" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="22" font-weight="bold">👥</text>
  <text x="620" y="145" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="14">Multi-Agent</text>
  <rect x="540" y="155" width="160" height="3" rx="1" fill="#a78bfa" fill-opacity="0.3"/>
  <text x="620" y="180" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">多角色分工协作</text>
  <text x="620" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">各司其职</text>
  <text x="620" y="220" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="11">适合调研/分析</text>

  <!-- Bottom text -->
  <rect x="250" y="250" width="300" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="269" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">叠层关系：不是替代，是升级</text>
</svg>
