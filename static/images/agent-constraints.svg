<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Agent 模式的 4 个硬约束</text>

  <!-- Card 1: Token -->
  <rect x="20" y="60" width="370" height="85" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <circle cx="50" cy="90" r="16" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="50" y="95" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">①</text>
  <text x="78" y="88" fill="#f97316" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Token 消耗很大</text>
  <text x="78" y="108" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">改一个函数：Chat 几百 token vs Agent 几万 token</text>
  <text x="78" y="125" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">做个一天活，账单可能比午饭还贵</text>

  <!-- Card 2: Context -->
  <rect x="410" y="60" width="370" height="85" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <circle cx="440" cy="90" r="16" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="440" y="95" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">②</text>
  <text x="468" y="88" fill="#f97316" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">上下文是硬天花板</text>
  <text x="468" y="108" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">超 40-50k token 后 Agent 开始「失忆」</text>
  <text x="468" y="125" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">忘掉最早的需求，把不相关文件混在一起改</text>

  <!-- Card 3: Loop -->
  <rect x="20" y="160" width="370" height="85" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <circle cx="50" cy="190" r="16" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="50" y="195" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">③</text>
  <text x="78" y="188" fill="#f97316" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">容易陷入修复循环</text>
  <text x="78" y="208" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">发现 bug → 尝试修 → 引入新 bug → 再修 → 再引入</text>
  <text x="78" y="225" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">最夸张一次：同一个函数反复改了 7 次</text>

  <!-- Card 4: Blindness -->
  <rect x="410" y="160" width="370" height="85" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <circle cx="440" cy="190" r="16" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="440" y="195" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">④</text>
  <text x="468" y="188" fill="#f97316" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">不理解「还没写」的部分</text>
  <text x="468" y="208" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">只能看到已有代码，不知道你脑子里未落地的设计</text>
  <text x="468" y="225" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">能做好修改和扩展，但做不好从零构建</text>

  <!-- Bottom tip -->
  <rect x="250" y="400" width="300" height="35" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="11">💡 最有效的操作：Ctrl+C 重来</text>
</svg>
