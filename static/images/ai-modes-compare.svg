<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Chat card gradient -->
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Agent card gradient -->
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Multi-Agent card gradient -->
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">三种模式对比</text>

  <!-- Card 1: Chat Mode -->
  <rect x="20" y="55" width="245" height="420" rx="10" fill="url(#card1)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="20" y="55" width="245" height="45" rx="10" fill="#22d3ee" fill-opacity="0.1"/>
  <text x="142" y="85" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">💬 Chat 模式</text>
  
  <text x="142" y="135" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">交互方式</text>
  <text x="142" y="152" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">对话 + 手搓粘贴</text>
  <line x1="35" y1="162" x2="250" y2="162" stroke="#334155" stroke-width="0.5"/>

  <text x="142" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">代表工具</text>
  <text x="142" y="202" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">ChatGPT、Claude Web</text>
  <line x1="35" y1="212" x2="250" y2="212" stroke="#334155" stroke-width="0.5"/>

  <text x="142" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">控制力</text>
  <text x="142" y="252" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12">★★★★★</text>
  <line x1="35" y1="262" x2="250" y2="262" stroke="#334155" stroke-width="0.5"/>

  <text x="142" y="285" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">效率</text>
  <text x="142" y="302" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="12">★★☆☆☆</text>
  <line x1="35" y1="312" x2="250" y2="312" stroke="#334155" stroke-width="0.5"/>

  <text x="142" y="335" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">学习成本</text>
  <text x="142" y="352" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12">零</text>
  <line x1="35" y1="362" x2="250" y2="362" stroke="#334155" stroke-width="0.5"/>

  <text x="142" y="385" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">典型场景</text>
  <text x="142" y="402" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">写段代码、改算法</text>

  <!-- Card 2: Agent Mode -->
  <rect x="277" y="55" width="245" height="420" rx="10" fill="url(#card2)" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="277" y="55" width="245" height="45" rx="10" fill="#34d399" fill-opacity="0.1"/>
  <text x="400" y="85" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">🤖 Agent 模式</text>
  
  <text x="400" y="135" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">交互方式</text>
  <text x="400" y="152" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">指令 + 自动执行</text>
  <line x1="292" y1="162" x2="507" y2="162" stroke="#334155" stroke-width="0.5"/>

  <text x="400" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">代表工具</text>
  <text x="400" y="202" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">Claude Code、Codex CLI</text>
  <line x1="292" y1="212" x2="507" y2="212" stroke="#334155" stroke-width="0.5"/>

  <text x="400" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">控制力</text>
  <text x="400" y="252" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12">★★★☆☆</text>
  <line x1="292" y1="262" x2="507" y2="262" stroke="#334155" stroke-width="0.5"/>

  <text x="400" y="285" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">效率</text>
  <text x="400" y="302" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12">★★★★☆</text>
  <line x1="292" y1="312" x2="507" y2="312" stroke="#334155" stroke-width="0.5"/>

  <text x="400" y="335" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">学习成本</text>
  <text x="400" y="352" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="12">低</text>
  <line x1="292" y1="362" x2="507" y2="362" stroke="#334155" stroke-width="0.5"/>

  <text x="400" y="385" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">典型场景</text>
  <text x="400" y="402" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">加功能、重构模块</text>

  <!-- Card 3: Multi-Agent -->
  <rect x="535" y="55" width="245" height="420" rx="10" fill="url(#card3)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="535" y="55" width="245" height="45" rx="10" fill="#a78bfa" fill-opacity="0.1"/>
  <text x="658" y="85" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">👥 Multi-Agent</text>
  
  <text x="658" y="135" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">交互方式</text>
  <text x="658" y="152" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">任务分解 + 分工协作</text>
  <line x1="550" y1="162" x2="765" y2="162" stroke="#334155" stroke-width="0.5"/>

  <text x="658" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">代表工具</text>
  <text x="658" y="202" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">CrewAI、自定义pipeline</text>
  <line x1="550" y1="212" x2="765" y2="212" stroke="#334155" stroke-width="0.5"/>

  <text x="658" y="235" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">控制力</text>
  <text x="658" y="252" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="12">★★☆☆☆</text>
  <line x1="550" y1="262" x2="765" y2="262" stroke="#334155" stroke-width="0.5"/>

  <text x="658" y="285" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">效率</text>
  <text x="658" y="302" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="12">★★★☆☆</text>
  <line x1="550" y1="312" x2="765" y2="312" stroke="#334155" stroke-width="0.5"/>

  <text x="658" y="335" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">学习成本</text>
  <text x="658" y="352" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="12">高</text>
  <line x1="550" y1="362" x2="765" y2="362" stroke="#334155" stroke-width="0.5"/>

  <text x="658" y="385" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">理想场景</text>
  <text x="658" y="402" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">研究调研、安全分析</text>
</svg>
