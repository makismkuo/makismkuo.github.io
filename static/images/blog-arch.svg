<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="user" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="local" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="github" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3949ab"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="actions" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="hk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#d84315"/>
    </linearGradient>
    <linearGradient id="cn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#ad1457"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64b5f6"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff8a65"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#90caf9" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" letter-spacing="2">HUGO BLOG 部署架构</text>

  <!-- Row 1: User → Local → GitHub -->
  <!-- Node 1: 用户 -->
  <rect x="30" y="65" width="100" height="50" rx="8" fill="url(#user)" filter="url(#glow)"/>
  <text x="80" y="92" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">👤 用户</text>
  <text x="80" y="107" text-anchor="middle" fill="#bbdefb" font-family="Arial, Helvetica, sans-serif" font-size="10">写 Markdown</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="90" x2="175" y2="90" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2: 本地 -->
  <rect x="180" y="65" width="110" height="50" rx="8" fill="url(#local)" filter="url(#glow)"/>
  <text x="235" y="92" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">💻 本地环境</text>
  <text x="235" y="107" text-anchor="middle" fill="#bbdefb" font-family="Arial, Helvetica, sans-serif" font-size="10">Markdown 文章</text>

  <!-- Arrow 2: git push -->
  <line x1="290" y1="90" x2="335" y2="90" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="312" y="82" text-anchor="middle" fill="#64b5f6" font-family="Arial, Helvetica, sans-serif" font-size="9">git push</text>

  <!-- Node 3: GitHub 仓库 -->
  <rect x="340" y="65" width="120" height="50" rx="8" fill="url(#github)" filter="url(#glow)"/>
  <text x="400" y="92" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">🐙 GitHub 仓库</text>
  <text x="400" y="107" text-anchor="middle" fill="#c5cae9" font-family="Arial, Helvetica, sans-serif" font-size="10">源码托管</text>

  <!-- Row 2: GitHub Actions + Pages -->
  <!-- Arrow 3: GitHub → Actions -->
  <line x1="400" y1="115" x2="400" y2="155" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 4: GitHub Actions -->
  <rect x="310" y="160" width="180" height="50" rx="8" fill="url(#actions)" filter="url(#glow)"/>
  <text x="400" y="185" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">⚡ GitHub Actions</text>
  <text x="400" y="200" text-anchor="middle" fill="#b2ebf2" font-family="Arial, Helvetica, sans-serif" font-size="10">自动构建 Hugo 静态文件</text>

  <!-- Arrow 4: Actions → Pages -->
  <line x1="400" y1="210" x2="400" y2="250" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 5: GitHub Pages -->
  <rect x="310" y="255" width="180" height="50" rx="8" fill="url(#pages)" filter="url(#glow)"/>
  <text x="400" y="280" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">🌐 GitHub Pages</text>
  <text x="400" y="295" text-anchor="middle" fill="#c8e6c9" font-family="Arial, Helvetica, sans-serif" font-size="10">海外 CDN 访问</text>

  <!-- Row 3: HK Nginx → China -->
  <!-- Arrow 5: Pages → HK Server -->
  <line x1="490" y1="280" x2="540" y2="280" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrow-up)"/>
  <text x="515" y="272" text-anchor="middle" fill="#ff8a65" font-family="Arial, Helvetica, sans-serif" font-size="9">反向代理</text>

  <!-- Node 6: HK Server -->
  <rect x="545" y="255" width="130" height="50" rx="8" fill="url(#hk)" filter="url(#glow)"/>
  <text x="610" y="280" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">🖥️ HK 服务器</text>
  <text x="610" y="295" text-anchor="middle" fill="#ffe0b2" font-family="Arial, Helvetica, sans-serif" font-size="10">Nginx 反向代理</text>

  <!-- Arrow 6: HK → China -->
  <line x1="610" y1="305" x2="610" y2="345" stroke="#ff8a65" stroke-width="2" marker-end="url(#arrow-up)"/>

  <!-- Node 7: China -->
  <rect x="545" y="350" width="130" height="40" rx="8" fill="url(#cn)" filter="url(#glow)"/>
  <text x="610" y="374" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">🇨🇳 国内访问</text>

  <!-- Node 8 (small): blog.aibestapp.top -->
  <rect x="545" y="350" width="130" height="40" rx="8" fill="none" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="610" y="365" text-anchor="middle" fill="#f48fb1" font-family="Arial, Helvetica, sans-serif" font-size="9">blog.aibestapp.top</text>

  <!-- Legacy label on arrow -->
  <text x="610" y="345" text-anchor="end" fill="#ff8a65" font-family="Arial, Helvetica, sans-serif" font-size="9">DNS 解析</text>
</svg>