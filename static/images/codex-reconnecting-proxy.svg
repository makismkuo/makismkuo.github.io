<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Codex Desktop Reconnecting proxy fix</title>
  <desc id="desc">A diagram showing Codex Desktop using local proxy environment variables to avoid WebSocket reconnect loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="960" height="540" rx="24" fill="url(#bg)"/>
  <text x="48" y="64" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="700">Codex Desktop 一直 Reconnecting？</text>
  <text x="48" y="96" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">多数时候不是模型坏了，而是 WSS / 代理链路没走通。</text>

  <g filter="url(#shadow)">
    <rect x="50" y="150" width="230" height="142" rx="14" fill="#182235" stroke="#334155"/>
    <text x="78" y="193" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700">Codex Desktop</text>
    <text x="78" y="228" fill="#fb7185" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Reconnecting × 5</text>
    <text x="78" y="258" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">请求没有稳定出网</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="365" y="140" width="250" height="164" rx="14" fill="#102433" stroke="#0ea5e9"/>
    <text x="394" y="184" fill="#e0f2fe" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700">本地代理入口</text>
    <text x="394" y="222" fill="#7dd3fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">HTTP_PROXY</text>
    <text x="394" y="250" fill="#7dd3fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">HTTPS_PROXY</text>
    <text x="394" y="280" fill="#bae6fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">127.0.0.1:&lt;端口&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="150" width="210" height="142" rx="14" fill="#172033" stroke="#334155"/>
    <text x="730" y="193" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700">OpenAI 服务</text>
    <text x="730" y="229" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">连接稳定</text>
    <text x="730" y="258" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">少掉反复重连</text>
  </g>

  <line x1="290" y1="221" x2="348" y2="221" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="624" y1="221" x2="684" y2="221" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="360" width="860" height="104" rx="14" fill="#0b1220" stroke="#243047"/>
  <text x="96" y="399" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">~/.codex/.env</text>
  <text x="96" y="432" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">HTTP_PROXY="http://127.0.0.1:&lt;实际端口&gt;"</text>
  <text x="96" y="458" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">HTTPS_PROXY="http://127.0.0.1:&lt;实际端口&gt;"</text>

  <text x="48" y="508" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">Fanssen Notes · 先让 Codex 走对代理，再谈模型和工具问题</text>
</svg>
