<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="boxUser" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ea043"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="boxTG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#006699"/>
    </linearGradient>
    <linearGradient id="boxGW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="boxSub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="boxAI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#2ea043"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#d2a8ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" fill="#e6edf3" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">Telegram Bot 架构流程</text>

  <!-- === Row 1: Components === -->

  <!-- 1. 用户 -->
  <rect x="30" y="60" width="90" height="46" rx="10" fill="url(#boxUser)" filter="url(#shadow)"/>
  <text x="75" y="87" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">👤 用户</text>

  <!-- Arrow: User → Telegram App -->
  <line x1="120" y1="83" x2="165" y2="83" stroke="#2ea043" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- 2. Telegram App -->
  <rect x="168" y="60" width="100" height="46" rx="10" fill="url(#boxTG)" filter="url(#shadow)"/>
  <text x="218" y="87" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">📱 Telegram</text>

  <!-- Arrow: Telegram App → Webhook Bot -->
  <line x1="268" y1="83" x2="313" y2="83" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- 3. Telegram Bot (Webhook) -->
  <rect x="316" y="55" width="110" height="56" rx="10" fill="url(#boxGW)" filter="url(#shadow)"/>
  <text x="371" y="78" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">🤖 Telegram Bot</text>
  <text x="371" y="95" fill="#b3d8ff" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Webhook</text>

  <!-- Arrow: Webhook Bot → Hermes Gateway -->
  <line x1="426" y1="83" x2="471" y2="83" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- 4. Hermes Gateway -->
  <rect x="474" y="60" width="100" height="46" rx="10" fill="url(#boxSub)" filter="url(#shadow)"/>
  <text x="524" y="87" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">⚡ Hermes<br/>Gateway</text>

  <!-- Arrow: Hermes → sub2api -->
  <line x1="574" y1="83" x2="619" y2="83" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- 5. sub2api 中转 -->
  <rect x="622" y="60" width="85" height="46" rx="10" fill="url(#boxGW)" filter="url(#shadow)"/>
  <text x="664" y="87" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">🔄 sub2api<br/>中转</text>

  <!-- Arrow: sub2api → AI -->
  <line x1="707" y1="83" x2="752" y2="83" stroke="#d2a8ff" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- 6. DeepSeek / AI -->
  <rect x="755" y="55" width="40" height="56" rx="10" fill="url(#boxAI)" filter="url(#shadow)"/>
  <text x="775" y="74" fill="#fff" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">🧠 AI</text>
  <text x="775" y="90" fill="#e8d5ff" font-family="Arial, sans-serif" font-size="7" text-anchor="middle">DeepSeek</text>

  <!-- === Label: 上行 (Sent) === -->
  <text x="400" y="130" fill="#8b949e" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">—— 请求上行 ——</text>

  <!-- === Row 2: Return path (bottom) === -->
  <text x="400" y="155" fill="#8b949e" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-style="italic">—— 回复下行 ——</text>

  <!-- Return arrows (bottom row, right to left) -->
  <!-- AI → sub2api -->
  <line x1="775" y1="178" x2="664" y2="178" stroke="#d2a8ff" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>

  <!-- sub2api → Hermes -->
  <line x1="622" y1="178" x2="524" y2="178" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>

  <!-- Hermes → Webhook Bot -->
  <line x1="474" y1="178" x2="371" y2="178" stroke="#3fb950" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Webhook Bot → Telegram -->
  <line x1="316" y1="178" x2="218" y2="178" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>

  <!-- Telegram → User -->
  <line x1="168" y1="178" x2="75" y2="178" stroke="#2ea043" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- === Bottom labels === -->
  <text x="775" y="200" fill="#d2a8ff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">DeepSeek<br/>回复</text>
  <text x="664" y="200" fill="#58a6ff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">sub2api<br/>转发</text>
  <text x="524" y="200" fill="#3fb950" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Hermes<br/>处理</text>
  <text x="371" y="200" fill="#58a6ff" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Webhook<br/>回调</text>
  <text x="218" y="200" fill="#0088cc" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">推送消息</text>
  <text x="75" y="200" fill="#2ea043" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">接收回复</text>

  <!-- Footer note -->
  <text x="400" y="245" fill="#484f58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">用户发送消息 → 经 Telegram Webhook → Hermes Gateway → sub2api 中转 → AI 模型 → 原路返回</text>

  <!-- Decorative corner lines -->
  <line x1="0" y1="0" x2="0" y2="12" stroke="#2ea043" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="0" x2="12" y2="0" stroke="#2ea043" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="0" x2="788" y2="0" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="0" x2="800" y2="12" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="300" x2="0" y2="288" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="300" x2="12" y2="300" stroke="#58a6ff" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="300" x2="800" y2="288" stroke="#2ea043" stroke-width="2" opacity="0.5"/>
  <line x1="800" y1="300" x2="788" y2="300" stroke="#2ea043" stroke-width="2" opacity="0.5"/>
</svg>
