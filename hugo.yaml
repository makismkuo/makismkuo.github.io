baseURL: "https://makismkuo.github.io/"
locale: zh-cn
title: "Fanssen Notes"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: ""

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Fanssen Notes"
  description: "每天研究一个 GitHub 项目 - Fanssen Tech 部署心得 & 技术笔记"
  keywords: [Blog, Fanssen, Tech, GitHub]
  author: "Seb"
  images: [""]
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  homeInfoParams:
    Title: "Fanssen Notes"
    Content: >
      凡森科技 · 技术笔记
    
      每天从推特上找一个 GitHub 项目，研究、部署、写心得。  
      这里有我的技术笔记、项目实战、以及踩坑记录。

  socialIcons:
    - name: github
      url: "https://github.com/makismkuo"
    - name: x
      url: "https://x.com/makismkuo"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false
    linkFullImages: false

  editPost:
    URL: ""
    Text: ""
    appendFilePath: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 2
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 3
    - identifier: search
      name: 搜索
      url: /search/
      weight: 4

outputs:
  home:
    - HTML
    - RSS
    - JSON
